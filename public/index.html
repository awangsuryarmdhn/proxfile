<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro WA Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --border: #262626;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            --accent: #eee;
            --accent-hover: #fff;
            --success: #34d399;
            --error: #f87171;
            --focus-ring: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        /* Nav */
        nav {
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg);
            position: sticky; top: 0; z-index: 10;
        }
        .brand {
            font-weight: 600; font-size: 16px; letter-spacing: -0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* Layout */
        .container {
            flex: 1; max-width: 1100px;
            margin: 0 auto; padding: 32px 20px;
            display: grid; grid-template-columns: 320px 1fr; gap: 24px;
            width: 100%;
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
        }

        .panel-title {
            font-size: 13px; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 16px; border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        /* Dropzone */
        .drop-zone {
            border: 1px dashed var(--border);
            border-radius: 6px; padding: 24px;
            text-align: center; cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 20px;
        }
        .drop-zone:hover { border-color: var(--text-muted); background: rgba(255, 255, 255, 0.03); }
        .drop-zone svg { color: var(--text-muted); margin-bottom: 8px; }
        .drop-zone p { color: var(--text-muted); font-size: 13px; }
        input[type="file"] { display: none; }

        /* Stats */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box {
            background: var(--bg); border: 1px solid var(--border);
            padding: 12px; border-radius: 6px;
        }
        .stat-value { font-size: 20px; font-weight: 500; font-variant-numeric: tabular-nums; }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .success-text { color: var(--success); }

        /* Progress */
        .progress-wrap { margin-bottom: 20px; }
        .progress-bar {
            height: 4px; background: var(--border); border-radius: 2px;
            overflow: hidden; margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--accent);
            transition: width 0.3s ease;
        }
        .progress-meta {
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--text-muted);
        }

        /* Buttons */
        .btn {
            width: 100%; padding: 10px; border-radius: 6px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: all 0.2s ease; border: 1px solid transparent;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 8px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
        
        .btn-outline { background: transparent; color: var(--text-main); border-color: var(--border); }
        .btn-outline:hover:not(:disabled) { background: var(--border); }

        /* Term Log */
        .terminal {
            background: #000; border: 1px solid var(--border);
            border-radius: 8px; height: calc(100vh - 120px);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .term-header {
            padding: 12px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between;
            font-size: 12px; color: var(--text-muted);
        }
        .term-body {
            flex: 1; padding: 16px; overflow-y: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 12px; line-height: 1.5; color: #a1a1aa;
        }
        
        .log-row { margin-bottom: 4px; display: flex; gap: 12px; }
        .log-time { color: #52525b; width: 65px; flex-shrink: 0; }
        .log-tag { width: 50px; flex-shrink: 0; }
        .tag-hit { color: var(--success); }
        .tag-miss { color: #52525b; }
        .tag-info { color: #93c5fd; }
        .tag-err { color: var(--error); }
        .log-msg { color: #d4d4d8; word-break: break-all; }
        
        /* Auto Appeal Modal */
        #appealSection {
            margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--border);
        }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .input-control {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 12px; border-radius: 4px;
            font-size: 13px; outline: none; transition: border-color 0.2s;
        }
        .input-control:focus { border-color: var(--text-muted); }

    </style>
</head>
<body>

    <nav>
        <div class="brand">
            <div class="status-dot" id="globalStatus"></div>
            Nitro Engine
        </div>
        <div style="font-size: 12px; color: var(--text-muted);">
            Render Edition // V3.1
        </div>
    </nav>

    <div class="container">
        <!-- Sidebar -->
        <aside class="panel">
            <div class="panel-title">Batch Configuration</div>
            
            <label class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept=".txt">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                <p id="fileLabel">Upload Dataset (.txt)</p>
            </label>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total Numbers</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value success-text" id="hitCount">0</div>
                    <div class="stat-label">Verified (Hits)</div>
                </div>
            </div>

            <div class="progress-wrap">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="progress-meta">
                    <span id="progressText">0%</span>
                    <span id="speedText">0/min</span>
                </div>
            </div>

            <button class="btn btn-primary" id="startBtn" disabled>
                Initiate Sequence
            </button>
            <button class="btn btn-outline" id="stopBtn" disabled>
                Halt Engine
            </button>
            <button class="btn btn-outline" id="downloadBtn" disabled>
                Export CSV
            </button>

            <!-- Auto Appeal Mini-UI -->
            <div id="appealSection">
                <div class="panel-title" style="margin-bottom: 12px; border-bottom: none;">Appeals (Auto-Unban)</div>
                <div class="input-group">
                    <input type="text" id="appealNum" class="input-control" placeholder="Target Number (e.g. 62812...)">
                </div>
                <button class="btn btn-outline" id="appealBtn" style="border-style: dashed;">
                    Send Appeal Ticket
                </button>
                <div id="appealStatus" style="font-size: 11px; margin-top: 8px; color: var(--text-muted);"></div>
            </div>
        </aside>

        <!-- Main Terminal -->
        <main class="terminal">
            <div class="term-header">
                <span>Operation Log</span>
                <span id="threadStatus">Idling</span>
            </div>
            <div class="term-body" id="logBox">
                <div class="log-row">
                    <span class="log-time">[00:00:00]</span>
                    <span class="log-tag tag-info">SYS</span>
                    <span class="log-msg">Kernel active. Awaiting instructions.</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const fileInput = document.getElementById('fileInput');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const appealBtn = document.getElementById('appealBtn');
        const logBox = document.getElementById('logBox');
        
        let numbers = [];
        let results = [];
        let isRunning = false;

        // Logging utility
        function addLog(tag, msg) {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            let tagClass = 'tag-info';
            if (tag === 'HIT') tagClass = 'tag-hit';
            if (tag === 'MISS') tagClass = 'tag-miss';
            if (tag === 'ERR') tagClass = 'tag-err';

            const div = document.createElement('div');
            div.className = 'log-row';
            div.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-tag ${tagClass}">${tag}</span>
                <span class="log-msg">${msg}</span>
            `;
            logBox.appendChild(div);
            // Auto scroll
            logBox.scrollTop = logBox.scrollHeight;
            // Memory limit
            if (logBox.children.length > 100) logBox.firstElementChild.remove();
        }

        // File Parsing
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const text = ev.target.result;
                numbers = text.split(/\r?\n/).map(l => l.replace(/\D/g, '')).filter(l => l.length > 5);
                document.getElementById('totalCount').innerText = numbers.length;
                document.getElementById('fileLabel').innerText = `${file.name} (${numbers.length} items)`;
                startBtn.disabled = false;
                addLog('SYS', `Loaded ${numbers.length} identifiers from disk.`);
            };
            reader.readAsText(file);
        };

        // Main Engine
        startBtn.onclick = async () => {
            if (numbers.length === 0) return;
            
            isRunning = true;
            results = [];
            startBtn.disabled = true;
            stopBtn.disabled = false;
            downloadBtn.disabled = true;
            document.getElementById('globalStatus').style.backgroundColor = '#facc15';
            document.getElementById('threadStatus').innerText = 'Processing Array';

            let processed = 0;
            let hits = 0;
            const startTime = Date.now();
            
            // Render Free Tier Limit Fix:
            // Process STRICTLY 1 Chunk at a time to prevent CPU choke (502 Bad Gateway)
            const CHUNK_SIZE = 50; 
            const chunks = [];
            for (let i = 0; i < numbers.length; i += CHUNK_SIZE) {
                chunks.push(numbers.slice(i, i + CHUNK_SIZE));
            }

            addLog('SYS', `Execution mapped to ${chunks.length} task blocks.`);

            for (let i = 0; i < chunks.length; i++) {
                if (!isRunning) break;
                
                const chunk = chunks[i];
                try {
                    const resp = await fetch('/api/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ numbers: chunk, concurrency: 10, timeout: 7000 })
                    });
                    
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    
                    const data = await resp.json();
                    data.results.forEach(r => {
                        results.push(r);
                        if (r.exists) {
                            hits++;
                            addLog('HIT', `Validated: ${r.number}`);
                        }
                    });
                    
                    processed += chunk.length;
                    updateUI(processed, hits, startTime);
                } catch (err) {
                    addLog('ERR', `Block ${i+1} failed (${err.message}). Queueing for manual review.`);
                    // Prevent total crash
                    processed += chunk.length; 
                    updateUI(processed, hits, startTime);
                }
            }

            addLog('SYS', `Routine terminated. Yield: ${hits} elements.`);
            document.getElementById('globalStatus').style.backgroundColor = 'var(--success)';
            document.getElementById('threadStatus').innerText = 'Standby';
            
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            downloadBtn.disabled = false;
        };

        function updateUI(processed, hits, startTime) {
            const pct = Math.floor((processed / numbers.length) * 100);
            document.getElementById('progressBar').style.width = `${pct}%`;
            document.getElementById('progressText').innerText = `${pct}%`;
            document.getElementById('hitCount').innerText = hits;
            
            const elapsedMin = (Date.now() - startTime) / 60000;
            const speed = Math.floor(processed / elapsedMin) || 0;
            document.getElementById('speedText').innerText = `${speed} / min`;
        }

        stopBtn.onclick = () => {
            isRunning = false;
            addLog('ERR', 'Halt command intercepted. Stopping sequencer.');
            stopBtn.disabled = true;
        };

        downloadBtn.onclick = () => {
            const content = results.map(r => `${r.number},${r.exists ? 'YES' : 'NO'}`).join('\n');
            const blob = new Blob([content], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = `NITRO_EXPORT_${Date.now()}.csv`;
            a.click();
        };

        // Appeal Binding
        appealBtn.onclick = async () => {
            const num = document.getElementById('appealNum').value.trim();
            if (!num) return;

            const statDiv = document.getElementById('appealStatus');
            statDiv.innerText = 'Transmitting appeal request...';
            statDiv.style.color = 'var(--accent)';
            appealBtn.disabled = true;

            try {
                const res = await fetch('/api/appeal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: num })
                });
                const data = await res.json();
                
                if (res.ok) {
                    statDiv.innerText = 'Appeal dispatched successfully.';
                    statDiv.style.color = 'var(--success)';
                    addLog('SYS', `Auto-Appeal sent correctly to Meta Support for [${num}]`);
                } else {
                    statDiv.innerText = `Error: ${data.message || data.error}`;
                    statDiv.style.color = 'var(--error)';
                }
            } catch (err) {
                statDiv.innerText = `Network failure: ${err.message}`;
                statDiv.style.color = 'var(--error)';
            }

            appealBtn.disabled = false;
            setTimeout(() => statDiv.innerText = '', 5000);
        };

        // Drag handlers
        const dropZone = document.getElementById('dropZone');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
            dropZone.addEventListener(ev, e => e.preventDefault());
        });

        dropZone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                fileInput.onchange({ target: { files: [file] } });
            }
        });
    </script>
</body>
</html>
